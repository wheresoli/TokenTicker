<title>LLM API Token Price Index</title>
<style>
  :root {
    --bg: #fbfbf9;
    --panel: #ffffff;
    --ink: #1a1a17;
    --muted: #6b6b63;
    --faint: #9a9a90;
    --line: #e7e6df;
    --line-strong: #d8d7cd;
    --bar: #eeede6;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
    --radius: 14px;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16161a;
      --panel: #1e1e24;
      --ink: #ecebe6;
      --muted: #9c9c95;
      --faint: #6f6f68;
      --line: #2c2c33;
      --line-strong: #3a3a42;
      --bar: #2a2a31;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"] {
    --bg: #fbfbf9; --panel: #ffffff; --ink: #1a1a17; --muted: #6b6b63; --faint: #9a9a90;
    --line: #e7e6df; --line-strong: #d8d7cd; --bar: #eeede6;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.04);
  }
  :root[data-theme="dark"] {
    --bg: #16161a; --panel: #1e1e24; --ink: #ecebe6; --muted: #9c9c95; --faint: #6f6f68;
    --line: #2c2c33; --line-strong: #3a3a42; --bar: #2a2a31;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.35);
  }
  /* Provider hues — validated colorblind-safe on both surfaces (scripts/validate_palette.js).
     Anthropic shifts on dark to stay inside the lightness band; OpenAI/Google pass unchanged. */
  :root { --c-anthropic: #d97757; --c-openai: #10a37f; --c-google: #4285f4; }
  @media (prefers-color-scheme: dark) { :root { --c-anthropic: #c86440; } }
  :root[data-theme="light"] { --c-anthropic: #d97757; }
  :root[data-theme="dark"] { --c-anthropic: #c86440; }

  * { box-sizing: border-box; }
  .tpt {
    font-family: var(--sans);
    color: var(--ink);
    background: var(--bg);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding: clamp(16px, 4vw, 40px);
    max-width: 1040px;
    margin: 0 auto;
  }
  .tpt a { color: inherit; }

  .tpt-head { display: flex; flex-wrap: wrap; align-items: flex-end; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  .tpt h1 { font-size: clamp(1.4rem, 3.5vw, 2rem); font-weight: 640; letter-spacing: -.02em; margin: 0; }
  .tpt-sub { color: var(--muted); font-size: .875rem; margin: 6px 0 0; }
  .tpt-sub b { color: var(--ink); font-weight: 600; }

  .tpt-theme {
    font: inherit; font-size: .8rem; color: var(--muted); cursor: pointer;
    background: var(--panel); border: 1px solid var(--line-strong); border-radius: 999px;
    padding: 6px 12px; transition: border-color .15s;
  }
  .tpt-theme:hover { border-color: var(--faint); }

  .tpt-calc {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px 18px;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 14px 18px; margin: 20px 0 18px;
  }
  .tpt-calc-label { font-size: .82rem; color: var(--muted); font-weight: 560; }
  .tpt-field { display: inline-flex; align-items: baseline; gap: 7px; }
  .tpt-field label { font-size: .82rem; color: var(--muted); }
  .tpt-field input {
    font: inherit; font-family: var(--mono); font-size: .85rem; color: var(--ink);
    width: 8ch; text-align: right; background: transparent;
    border: none; border-bottom: 1.5px solid var(--line-strong); padding: 2px 2px;
  }
  .tpt-field input:focus { outline: none; border-bottom-color: var(--ink); }
  .tpt-presets { display: inline-flex; gap: 6px; margin-left: auto; }
  .tpt-chip {
    font: inherit; font-size: .76rem; color: var(--muted); cursor: pointer;
    background: transparent; border: 1px solid var(--line-strong); border-radius: 999px; padding: 4px 10px;
  }
  .tpt-chip:hover { border-color: var(--faint); color: var(--ink); }

  .tpt-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); background: var(--panel); }
  table.tpt-tbl { width: 100%; border-collapse: collapse; font-size: .9rem; }
  /* transparent value wrapper: vanishes in the table, becomes the value box in card mode */
  .tpt-v { display: contents; }
  .tpt-tbl thead th {
    position: sticky; top: 0; z-index: 1; background: var(--panel);
    text-align: right; font-weight: 580; font-size: .74rem; letter-spacing: .04em; text-transform: uppercase;
    color: var(--muted); padding: 12px 14px; border-bottom: 1.5px solid var(--line-strong);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  .tpt-tbl thead th:first-child, .tpt-tbl thead th.l { text-align: left; }
  .tpt-tbl thead th .arw { opacity: 0; margin-left: 4px; font-size: .7rem; }
  .tpt-tbl thead th[aria-sort] .arw { opacity: 1; }
  .tpt-tbl tbody td { padding: 11px 14px; border-bottom: 1px solid var(--line); text-align: right; white-space: nowrap; }
  .tpt-tbl td.tpt-td-model { white-space: normal; min-width: 8.5rem; }
  /* Notes must wrap; two-class selector to beat the blanket `td { nowrap }` above */
  .tpt-tbl td.tpt-note { white-space: normal; }
  .tpt-tbl tbody tr:last-child td { border-bottom: none; }
  .tpt-tbl tbody tr:hover td { background: color-mix(in srgb, var(--ink) 3.5%, transparent); }
  .tpt-tbl td.l { text-align: left; }

  .tpt-model { font-weight: 580; }
  .tpt-id { font-family: var(--mono); font-size: .72rem; color: var(--faint); margin-top: 2px; }
  .tpt-badge { display: inline-flex; align-items: center; gap: 7px; font-weight: 560; }
  .tpt-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .tpt-num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .tpt-cached { display: block; font-size: .68rem; color: var(--faint); margin-top: 2px; }
  .tpt-tier { display: inline-block; font-size: .68rem; color: var(--muted); background: var(--bar); border-radius: 5px; padding: 1px 6px; margin-left: 8px; vertical-align: middle; }
  .tpt-ctx { color: var(--muted); font-family: var(--mono); font-size: .82rem; }

  .tpt-cell-call { position: relative; }
  .tpt-callbar { position: absolute; left: 0; top: 50%; transform: translateY(-50%); height: 26px; border-radius: 6px; opacity: .16; z-index: 0; }
  .tpt-callval { position: relative; z-index: 1; font-family: var(--mono); font-variant-numeric: tabular-nums; font-weight: 560; }

  .tpt-note { font-size: .72rem; color: var(--muted); text-align: left; white-space: normal; max-width: 22ch; }

  .tpt-foot { margin-top: 22px; font-size: .8rem; color: var(--muted); }
  .tpt-foot p { margin: 6px 0; }
  .tpt-srcs { display: flex; flex-wrap: wrap; gap: 6px 20px; margin: 8px 0; }
  .tpt-srcs a { color: var(--muted); text-decoration: none; border-bottom: 1px dotted var(--faint); }
  .tpt-srcs a:hover { color: var(--ink); }
  .tpt-disc { font-size: .78rem; padding: 11px 14px; background: var(--bar); border-radius: 10px; color: var(--muted); margin-top: 12px; }

  /* View toggle + live/snapshot status */
  .tpt-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin: 18px 0 0; }
  .tpt-seg { display: inline-flex; background: var(--bar); border-radius: 999px; padding: 3px; gap: 2px; }
  .tpt-seg button { font: inherit; font-size: .82rem; color: var(--muted); cursor: pointer; background: transparent; border: none; border-radius: 999px; padding: 6px 15px; }
  .tpt-seg button[aria-pressed="true"] { background: var(--panel); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); font-weight: 560; }
  .tpt-status { font-size: .76rem; color: var(--muted); display: inline-flex; align-items: center; gap: 7px; margin-left: auto; }
  .tpt-live { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); flex: none; }
  .tpt-status.is-live .tpt-live { background: #2fb170; box-shadow: 0 0 0 3px color-mix(in srgb, #2fb170 22%, transparent); }

  /* Views */
  .tpt-view-table.off, .tpt-trends { display: none; }
  .tpt-trends.on { display: block; }
  .tpt-chartcard { border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); background: var(--panel); padding: 16px 18px 18px; margin-top: 16px; }
  .tpt-chartbar { display: flex; flex-wrap: wrap; gap: 10px 14px; align-items: center; margin-bottom: 10px; }
  .tpt-mini { display: inline-flex; background: var(--bar); border-radius: 9px; padding: 2px; gap: 2px; }
  .tpt-mini button { font: inherit; font-size: .76rem; color: var(--muted); cursor: pointer; background: transparent; border: none; border-radius: 7px; padding: 5px 11px; }
  .tpt-mini button[aria-pressed="true"] { background: var(--panel); color: var(--ink); font-weight: 560; }
  .tpt-mini-label { font-size: .72rem; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; }
  .tpt-chart { width: 100%; height: auto; display: block; overflow: visible; }
  .tpt-chart .grid { stroke: var(--line); stroke-width: 1; }
  .tpt-chart .axis { stroke: var(--line-strong); stroke-width: 1; }
  .tpt-chart .tick { fill: var(--faint); font-family: var(--mono); font-size: 10px; }
  .tpt-chart .series { fill: none; stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
  .tpt-chart .dot { stroke: var(--panel); stroke-width: 1.5; }
  .tpt-chart .endlab { font-family: var(--sans); font-size: 11px; font-weight: 600; }
  .tpt-empty { color: var(--muted); font-size: .85rem; text-align: center; padding: 40px 10px; }
  .tpt-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .tpt-leg { display: inline-flex; align-items: center; gap: 9px; font: inherit; font-size: .78rem; cursor: pointer; background: transparent; border: 1px solid var(--line-strong); border-radius: 999px; padding: 5px 12px; color: var(--ink); }
  .tpt-leg[aria-pressed="false"] { opacity: .5; }
  .tpt-swatch { width: 18px; border-top: 3px solid var(--faint); border-radius: 2px; flex: none; }
  .tpt-leg .lv { font-family: var(--mono); font-variant-numeric: tabular-nums; color: var(--faint); }
  .tpt-hint { font-size: .75rem; color: var(--faint); margin: 12px 0 0; }

  /* Narrow screens: collapse each row into a stacked card so nothing scrolls sideways. */
  @media (max-width: 820px) {
    .tpt-wrap { overflow-x: visible; }
    .tpt-tbl { display: block; }
    .tpt-tbl thead { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }
    .tpt-tbl tbody { display: block; }
    .tpt-tbl tr { display: block; padding: 15px 16px; border-bottom: 1px solid var(--line); }
    .tpt-tbl tbody tr:hover td { background: transparent; }
    .tpt-tbl td { display: flex; justify-content: space-between; align-items: baseline; gap: 18px; padding: 3px 0; border: none; text-align: right; white-space: normal; }
    .tpt-tbl td::before { content: attr(data-label); flex: none; color: var(--muted); font-size: .72rem; letter-spacing: .04em; text-transform: uppercase; text-align: left; }
    .tpt-tbl .tpt-v { display: block; text-align: right; }
    /* Provider + model form the card's title block — no label, left aligned */
    .tpt-tbl td.tpt-td-prov, .tpt-tbl td.tpt-td-model { display: block; text-align: left; min-width: 0; }
    .tpt-tbl td.tpt-td-prov::before, .tpt-tbl td.tpt-td-model::before { content: none; }
    .tpt-tbl td.tpt-td-model { margin: 2px 0 10px; }
    .tpt-tbl td.tpt-td-prov .tpt-v, .tpt-tbl td.tpt-td-model .tpt-v { text-align: left; }
    .tpt-tbl td.tpt-td-model .tpt-model { font-size: 1.02rem; }
    .tpt-tbl td.tpt-blank { display: none; }
    .tpt-callbar { display: none; }
    .tpt-cell-call { position: static; }
    .tpt-note { max-width: none; }
  }
</style>

<div class="tpt">
  <div class="tpt-head">
    <div>
      <h1 id="tpt-title">LLM API Token Price Index</h1>
      <p class="tpt-sub" id="tpt-sub"></p>
    </div>
    <button class="tpt-theme" id="tpt-theme" type="button" aria-label="Toggle light/dark theme">◐ Theme</button>
  </div>

  <div class="tpt-calc">
    <span class="tpt-calc-label">Estimate a call:</span>
    <span class="tpt-field"><label for="tpt-in">input</label><input id="tpt-in" type="number" min="0" step="1000" value="10000"><span style="color:var(--faint);font-size:.8rem">tok</span></span>
    <span class="tpt-field"><label for="tpt-out">output</label><input id="tpt-out" type="number" min="0" step="500" value="2000"><span style="color:var(--faint);font-size:.8rem">tok</span></span>

  <div class="tpt-controls">

      <button data-view="trends" type="button" aria-pressed="false">Trends</button>

    <span class="tpt-status" id="tpt-status" title="Price source">

  </div>

  <div class="tpt-view-table" id="view-table">
  <div class="tpt-wrap">
    <table class="tpt-tbl" aria-label="LLM API token pricing">
      <thead>
        <tr>

      <tbody id="tpt-body"></tbody>
    </table>
  </div>
  </div><!-- /view-table -->

  <div class="tpt-trends" id="view-trends">
    <div class="tpt-chartcard">
      <div class="tpt-chartbar">
        <span class="tpt-mini-label">Metric</span>
        <span class="tpt-mini" role="group" aria-label="Metric">
          <button data-metric="input" type="button" aria-pressed="true">Input</button>
          <button data-metric="output" type="button" aria-pressed="false">Output</button>
          <button data-metric="call" type="button" aria-pressed="false">Cost / call</button>
        </span>
        <span class="tpt-mini-label">Scale</span>
        <span class="tpt-mini" role="group" aria-label="Scale">
          <button data-scale="log" type="button" aria-pressed="true">Log</button>
          <button data-scale="linear" type="button" aria-pressed="false">Linear</button>
        </span>
      </div>
      <div id="tpt-chart-host"></div>
      <div class="tpt-legend" id="tpt-legend"></div>
      <p class="tpt-hint" id="tpt-hint"></p>
    </div>
  </div>

  <div class="tpt-foot">
    <div class="tpt-srcs" id="tpt-srcs"></div>
    <p class="tpt-disc" id="tpt-disc"></p>
  </div>
</div>

      provider: p.name, pslug: provSlug(p.name), pvar: `var(--c-${provSlug(p.name)})`,
      name: m.name, id: m.id, key: `${p.name}:${m.id}`, tier: m.tier, widx: i,
      input: m.input, output: m.output, cachedInput: m.cachedInput,
      context: m.context, note: m.note || ""
    }))
  );

  const ctxRank = s => { const n = parseFloat(s); return /M/i.test(s) ? n * 1000 : n; };
  const callCost = r => (Number(inEl.value) || 0) / 1e6 * r.input + (Number(outEl.value) || 0) / 1e6 * r.output;

  const money = n => "$" + (n >= 1 ? n.toFixed(2) : n.toFixed(2));
  const callFmt = n => {
    const dp = n >= 0.1 ? 3 : n >= 0.01 ? 4 : 5;
    return "$" + n.toFixed(dp);
  };

  let sort = { k: "call", dir: "asc" };

  function valueFor(r, k) {
    if (k === "call") return callCost(r);
    if (k === "context") return ctxRank(r.context);
    return r[k];
  }

  function render() {
    const maxCall = Math.max(...rows.map(r => callCost(r)));
    const sorted = [...rows].sort((a, b) => {
      let va = valueFor(a, sort.k), vb = valueFor(b, sort.k);
      if (typeof va === "string") { va = va.toLowerCase(); vb = vb.toLowerCase(); }
      const c = va < vb ? -1 : va > vb ? 1 : 0;
      return sort.dir === "asc" ? c : -c;
    });

    body.innerHTML = sorted.map(r => {
      const c = callCost(r);
      const pct = maxCall > 0 ? (c / maxCall * 100) : 0;
      const cached = r.cachedInput != null
        ? `<span class="tpt-cached">cached in ${money(r.cachedInput)}</span>` : "";
      return `<tr>
        <td class="l tpt-td-prov" data-label="Provider"><div class="tpt-v"><span class="tpt-badge"><span class="tpt-dot" style="background:${r.pvar}"></span>${r.provider}</span></div></td>
        <td class="l tpt-td-model" data-label="Model"><div class="tpt-v"><div class="tpt-model">${r.name}<span class="tpt-tier">${r.tier}</span></div><div class="tpt-id">${r.id}</div></div></td>
        <td data-label="Input $/1M"><div class="tpt-v"><span class="tpt-num">${money(r.input)}</span>${cached}</div></td>
        <td data-label="Output $/1M"><div class="tpt-v"><span class="tpt-num">${money(r.output)}</span></div></td>
        <td class="tpt-cell-call" data-label="Cost / call"><span class="tpt-callbar" style="width:${pct}%;background:${r.pvar}"></span><div class="tpt-v"><span class="tpt-callval">${callFmt(c)}</span></div></td>
        <td data-label="Context"><div class="tpt-v"><span class="tpt-ctx">${r.context}</span></div></td>
        <td class="tpt-note${r.note ? "" : " tpt-blank"}" data-label="Notes"><div class="tpt-v">${r.note}</div></td>
      </tr>`;
    }).join("");

    document.querySelectorAll(".tpt-tbl thead th[data-k]").forEach(th => {
      const k = th.dataset.k;
      const arw = th.querySelector(".arw");
      if (k === sort.k) { th.setAttribute("aria-sort", sort.dir === "asc" ? "ascending" : "descending"); arw.textContent = sort.dir === "asc" ? "▲" : "▼"; }
      else { th.removeAttribute("aria-sort"); arw.textContent = ""; }
    });
  }

  document.querySelectorAll(".tpt-tbl thead th[data-k]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.dataset.k;
      const textCol = k === "provider" || k === "name";
      if (sort.k === k) sort.dir = sort.dir === "asc" ? "desc" : "asc";
      else sort = { k, dir: textCol ? "asc" : (k === "context" ? "desc" : "asc") };
      render();
    });
  });

  [inEl, outEl].forEach(el => el.addEventListener("input", () => { render(); renderChart(); renderLegend(); }));
  document.querySelectorAll(".tpt-chip").forEach(chip => chip.addEventListener("click", () => {
    inEl.value = chip.dataset.in; outEl.value = chip.dataset.out; render(); renderChart(); renderLegend();
  }));

  // Header meta + sources + disclaimer
  $("#tpt-title").textContent = DATA.meta.title;
  $("#tpt-sub").innerHTML = `${DATA.meta.unit} &middot; ${DATA.meta.tier} &middot; updated <b>${DATA.meta.updated}</b>`;
  $("#tpt-srcs").innerHTML = "Sources: " + DATA.providers.map(p =>
    `<a href="${p.source}" target="_blank" rel="noopener">${p.name} <span style="color:var(--faint)">(refreshed ${p.verified})</span></a>`
  ).join("");
  $("#tpt-disc").textContent = DATA.meta.disclaimer;

  // Theme toggle (standalone use; the host's theme still applies otherwise)
  const themeBtn = $("#tpt-theme");
  themeBtn.addEventListener("click", () => {
    const cur = document.documentElement.getAttribute("data-theme");
    const next = cur === "dark" ? "light" : cur === "light" ? "dark"
      : (matchMedia("(prefers-color-scheme: dark)").matches ? "light" : "dark");
    document.documentElement.setAttribute("data-theme", next);
  });

  // ---- Trends / history chart ------------------------------------------------
  const chartHost = $("#tpt-chart-host");
  const legendEl = $("#tpt-legend");
  const hintEl = $("#tpt-hint");
  const rowByKey = new Map(rows.map(r => [r.key, r]));
  const DASH = ["", "5 4", "1.5 4", "8 3 1.5 3"]; // within-provider variants (secondary encoding)
  const chart = { metric: "input", scale: "log", sel: new Set() };
  DATA.providers.forEach(p => chart.sel.add(`${p.name}:${p.models[0].id}`)); // default: top model per provider
  const today = new Date().toISOString().slice(0, 10);

  const metricVal = pr => {
    if (!pr) return null;
    if (chart.metric === "input") return pr.in;
    if (chart.metric === "output") return pr.out;
    return (Number(inEl.value) || 0) / 1e6 * pr.in + (Number(outEl.value) || 0) / 1e6 * pr.out;
  };
  const metricLabel = () => chart.metric === "input" ? "Input $/1M"
    : chart.metric === "output" ? "Output $/1M" : "Cost per call ($)";
  const seriesFor = key => HISTORY.snapshots
    .map(s => ({ date: s.date, v: metricVal(s.prices[key]) }))
    .filter(p => p.v != null);
  const fmtVal = v => chart.metric === "call"
    ? "$" + (v >= 0.1 ? v.toFixed(3) : v >= 0.01 ? v.toFixed(4) : v.toFixed(5))
    : "$" + v.toFixed(2);
  const tickLab = t => t >= 1 ? "$" + (Number.isInteger(t) ? t : +t.toFixed(1)) : "$" + (+t.toFixed(t >= 0.1 ? 1 : 2));
  const shortName = r => r.name.length > 15 ? r.name.slice(0, 14) + "…" : r.name;
  const niceStep = raw => { const p = Math.pow(10, Math.floor(Math.log10(raw))); const f = raw / p; return (f < 1.5 ? 1 : f < 3 ? 2 : f < 7 ? 5 : 10) * p; };
  function yTicks(min, max, log) {
    if (log) { const out = []; for (let k = Math.floor(Math.log10(min)); k <= Math.ceil(Math.log10(max)); k++) out.push(Math.pow(10, k)); return out.filter(t => t >= min * 0.999 && t <= max * 1.001); }
    const step = niceStep((max - min) / 4 || 1), out = [];
    for (let v = Math.ceil(min / step) * step; v <= max + 1e-9; v += step) out.push(+v.toFixed(6));
    return out;
  }

  function renderChart() {
    const W = 760, H = 340, m = { t: 14, r: 108, b: 30, l: 50 };
    const pw = W - m.l - m.r, ph = H - m.t - m.b;
    const dates = HISTORY.snapshots.map(s => s.date);
    const series = [...chart.sel].filter(k => rowByKey.has(k))
      .map(k => ({ row: rowByKey.get(k), pts: seriesFor(k) })).filter(s => s.pts.length);
    if (!series.length) { chartHost.innerHTML = `<div class="tpt-empty">Pick one or more models below to plot them.</div>`; return; }

    const vals = series.flatMap(s => s.pts.map(p => p.v));
    let vMin = Math.min(...vals), vMax = Math.max(...vals);
    const log = chart.scale === "log" && vMin > 0;
    if (log) { vMin = Math.pow(10, Math.floor(Math.log10(vMin))); vMax = Math.pow(10, Math.ceil(Math.log10(vMax))); }
    else { const pad = (vMax - vMin) * 0.08 || vMax * 0.12 || 1; vMin = Math.max(0, vMin - pad); vMax += pad; }
    if (vMax === vMin) vMax = vMin + 1;
    const xi = i => m.l + (dates.length === 1 ? pw / 2 : i / (dates.length - 1) * pw);
    const xByDate = new Map(dates.map((d, i) => [d, xi(i)]));
    const ys = v => { const t = log ? (Math.log10(v) - Math.log10(vMin)) / (Math.log10(vMax) - Math.log10(vMin)) : (v - vMin) / (vMax - vMin); return m.t + (1 - t) * ph; };

    let svg = `<svg class="tpt-chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="${metricLabel()} over time">`;
    yTicks(vMin, vMax, log).forEach(t => { const y = ys(t); svg += `<line class="grid" x1="${m.l}" y1="${y.toFixed(1)}" x2="${W - m.r}" y2="${y.toFixed(1)}"/><text class="tick" x="${m.l - 8}" y="${(y + 3).toFixed(1)}" text-anchor="end">${tickLab(t)}</text>`; });
    dates.forEach((d, i) => { svg += `<text class="tick" x="${xi(i).toFixed(1)}" y="${H - m.b + 16}" text-anchor="middle">${d.slice(5)}</text>`; });
    svg += `<line class="axis" x1="${m.l}" y1="${H - m.b}" x2="${W - m.r}" y2="${H - m.b}"/>`;
    series.forEach(s => {
      const col = s.row.pvar, dash = DASH[s.row.widx % DASH.length];
      const pts = s.pts.map(p => ({ x: xByDate.get(p.date), y: ys(p.v), v: p.v, date: p.date })).filter(p => p.x != null);
      if (pts.length > 1) svg += `<path class="series" style="stroke:${col}" stroke-dasharray="${dash}" d="M${pts.map(p => `${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(" L")}"/>`;
      pts.forEach((p, i) => { svg += `<circle class="dot" style="fill:${col}" cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i === pts.length - 1 ? 4.5 : 3}"><title>${s.row.name} — ${p.date}: ${fmtVal(p.v)}</title></circle>`; });
      const last = pts[pts.length - 1];
      svg += `<text class="endlab" x="${(last.x + 8).toFixed(1)}" y="${(last.y + 3.5).toFixed(1)}" style="fill:var(--ink)">${shortName(s.row)}</text>`;
    });
    svg += `</svg>`;
    chartHost.innerHTML = svg;
  }

  function renderLegend() {
    legendEl.innerHTML = rows.map(r => {
      const on = chart.sel.has(r.key);
      const s = seriesFor(r.key);
      const cur = s.length ? fmtVal(s[s.length - 1].v) : "—";
      const dash = DASH[r.widx % DASH.length] ? "border-top-style:dashed;" : "";
      return `<button class="tpt-leg" type="button" data-key="${r.key}" aria-pressed="${on}">`
        + `<span class="tpt-swatch" style="border-top-color:${r.pvar};${dash}"></span>`
        + `${r.name}<span class="lv">${cur}</span></button>`;
    }).join("");
    const n = HISTORY.snapshots.length;
    hintEl.textContent = n <= 1
      ? "History has one snapshot so far — the daily workflow appends a point per day, and the lines grow from here."
      : `${n} daily snapshots · hover a point for its value · toggle models below to compare.`;
  }

  legendEl.addEventListener("click", e => {
    const b = e.target.closest(".tpt-leg"); if (!b) return;
    const k = b.dataset.key;
    chart.sel.has(k) ? chart.sel.delete(k) : chart.sel.add(k);
    renderChart(); renderLegend();
  });
  document.querySelectorAll("[data-metric]").forEach(b => b.addEventListener("click", () => {
    chart.metric = b.dataset.metric;
    document.querySelectorAll("[data-metric]").forEach(x => x.setAttribute("aria-pressed", x === b));
    renderChart(); renderLegend();
  }));
  document.querySelectorAll("[data-scale]").forEach(b => b.addEventListener("click", () => {
    chart.scale = b.dataset.scale;
    document.querySelectorAll("[data-scale]").forEach(x => x.setAttribute("aria-pressed", x === b));
    renderChart();
  }));
  document.querySelectorAll("[data-view]").forEach(b => b.addEventListener("click", () => {
    const v = b.dataset.view;
    document.querySelectorAll("[data-view]").forEach(x => x.setAttribute("aria-pressed", x === b));
    $("#view-table").classList.toggle("off", v !== "table");
    $("#view-trends").classList.toggle("on", v === "trends");
    if (v === "trends") renderChart();
  }));

  // Progressive enhancement: refresh current numbers live from the feed (Pages only;
  // the Artifact's CSP blocks it, so it silently falls back to the committed snapshot).
  async function refreshLive() {
    const status = $("#tpt-status"), txt = status.querySelector(".tpt-txt");
    try {
      const res = await fetch("https://openrouter.ai/api/v1/models", { headers: { accept: "application/json" } });
      if (!res.ok) throw 0;
      const feed = await res.json();
      const norm = s => String(s).toLowerCase().replace(/[^a-z0-9]/g, "");
      const idx = new Map();
      (feed.data || []).forEach(mm => { if (mm && mm.pricing) idx.set(norm(mm.id), mm); });
      let n = 0;
      rows.forEach(r => {
        const src = idx.get(norm(r.provider) + norm(r.id)) || idx.get(norm(r.id));
        if (!src || !src.pricing) return;
        const inp = Math.round(Number(src.pricing.prompt) * 1e6 * 1e4) / 1e4;
        const out = Math.round(Number(src.pricing.completion) * 1e6 * 1e4) / 1e4;
        if (!(inp > 0 && out > 0 && inp < 1000 && out < 2000)) return;                 // sanity bounds
        if (Math.abs(inp - r.input) / (r.input || inp) > 0.6 ||
            Math.abs(out - r.output) / (r.output || out) > 0.6) return;                // ignore absurd jumps
        r.input = inp; r.output = out; n++;
      });
      if (n) {
        const prices = {}; rows.forEach(r => prices[r.key] = { in: r.input, out: r.output });
        const at = HISTORY.snapshots.findIndex(s => s.date === today);
        if (at >= 0) HISTORY.snapshots[at] = { date: today, prices }; else HISTORY.snapshots.push({ date: today, prices });
        render(); renderChart();
        status.classList.add("is-live"); txt.textContent = `live · ${n}/${rows.length} · ${today}`;
        status.title = `${n} of ${rows.length} models refreshed live from the OpenRouter feed; the rest are the committed snapshot`;
      } else {
        // Feed reachable but no models matched — the table is still the committed snapshot.
        status.classList.remove("is-live"); txt.textContent = `snapshot · ${DATA.meta.updated}`;
        status.title = "Live feed reachable but no models matched — showing the committed snapshot";
      }
      renderLegend();
    } catch (e) {
      status.classList.remove("is-live"); txt.textContent = `snapshot · ${DATA.meta.updated}`;
      status.title = "Showing the committed snapshot (live feed not reachable in this context)";
    }
  }

  render();
  $("#tpt-status .tpt-txt").textContent = `snapshot · ${DATA.meta.updated}`;
  renderLegend();
  renderChart();
  refreshLive();
</script>
